name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mortgage-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mortgage-app

      # Browsers live in ~/.cache/ms-playwright in CI (not PLAYWRIGHT_BROWSERS_PATH=0).
      # npm run e2e forces node_modules/.local-browsers, which is never cached — see e2e step below.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: mortgage-app

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # Headless shell only (~115 MiB + ffmpeg). Skips full Chrome for Testing (~175 MiB).
        run: npx playwright install --with-deps --only-shell chromium
        working-directory: mortgage-app

      - name: Lint
        run: npm run lint
        working-directory: mortgage-app

      - name: Format check
        run: npm run format:check
        working-directory: mortgage-app

      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: mortgage-app

      - name: Run tests with coverage
        run: npm test -- --watch=false --coverage
        working-directory: mortgage-app

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mortgage-app/coverage/
          if-no-files-found: ignore

      - name: Build
        run: npm run build
        working-directory: mortgage-app

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.0 autorun
        working-directory: mortgage-app

      - name: E2E tests (production build)
        run: npx playwright test
        working-directory: mortgage-app
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mortgage-app/playwright-report/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mortgage-app/dist/mortgage-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
