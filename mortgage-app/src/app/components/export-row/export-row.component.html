<div class="export-row">
  @if (showPrint()) {
    <button type="button" class="btn-outline" (click)="print()">&#128424; Εκτύπωση</button>
  }
  @if (showCopy()) {
    <button type="button" class="btn-outline" (click)="copySummary()">&#128203; Αντιγραφή</button>
  }
  @if (showShare() && sharePath()) {
    <button type="button" class="btn-outline" (click)="copyLink()">&#128279; Σύνδεσμος</button>
    <button type="button" class="btn-outline" (click)="shareWhatsApp()">WhatsApp</button>
  }
</div>
