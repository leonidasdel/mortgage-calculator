<div class="export-row">
  @if (showPrint()) {
    <button type="button" class="btn-outline" (click)="print()">&#128424; Εκτύπωση</button>
  }
  @if (showCopy()) {
    <button
      type="button"
      class="btn-outline"
      data-testid="export-copy-summary"
      (click)="copySummary()"
    >
      &#128203; Αντιγραφή
    </button>
  }
  @if (showShare() && sharePath()) {
    <button type="button" class="btn-outline" data-testid="export-share-link" (click)="copyLink()">
      &#128279; Σύνδεσμος
    </button>
    <button type="button" class="btn-outline" (click)="shareWhatsApp()">WhatsApp</button>
    <p class="export-share-hint" data-testid="export-share-hint">
      Ο σύνδεσμος περιέχει τις τιμές της φόρμας. Μην τον μοιράζεστε αν δεν το επιθυμείτε.
      <a href="/privacy">Απόρρητο</a>
    </p>
  }
</div>
