@if (visible()) {
  <div class="bulk-er-form">
    <div class="bulk-title">Μαζική Προσθήκη Πρόωρων Αποπληρωμών</div>
    <div class="bulk-er-grid">
      <div>
        <label>Από Μήνα</label>
        <input type="number" [formField]="formFields.startMonth">
      </div>
      <div>
        <label>Ποσό (€)</label>
        <div class="input-wrap has-pfx">
          <span class="pfx" style="font-size:12px;">€</span>
          <input type="number" [formField]="formFields.amount">
        </div>
      </div>
      <div>
        <label>Κάθε (μήνες)</label>
        <input type="number" [formField]="formFields.every">
      </div>
      <div>
        <label>Αριθμός Πληρωμών</label>
        <input type="number" [formField]="formFields.count">
      </div>
    </div>
    <div class="bulk-preview">{{ preview() }}</div>
    <div class="bulk-actions">
      <button class="btn-primary" (click)="submit()">Προσθήκη</button>
      <button class="btn-outline" (click)="cancelled.emit()">Ακύρωση</button>
    </div>
  </div>
}
