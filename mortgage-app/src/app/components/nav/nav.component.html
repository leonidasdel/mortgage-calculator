<!-- Mobile top bar -->
<div class="mobile-topbar">
  <button class="hamburger" (click)="toggleMenu()" [class.open]="mobileMenuOpen" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <a class="brand" routerLink="/" (click)="closeMenu()">Salaries<span class="brand-dot">.gr</span></a>
</div>

<!-- Backdrop (mobile overlay) -->
@if (mobileMenuOpen) {
  <div class="sidebar-backdrop" (click)="closeMenu()"></div>
}

<!-- Sidebar -->
<aside class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileMenuOpen">
  <div class="sidebar-header">
    @if (!collapsed) {
      <a class="brand" routerLink="/" (click)="closeMenu()">Salaries<span class="brand-dot">.gr</span></a>
    }
    <button class="collapse-btn" (click)="toggleCollapse()" aria-label="Toggle sidebar">
      @if (collapsed) { › } @else { ‹ }
    </button>
  </div>

  <nav class="sidebar-nav">
    @for (group of navGroups; track group.label) {
      <div class="nav-group">
        @if (!collapsed) {
          <div class="nav-group-label">{{ group.label }}</div>
        }
        @for (item of group.items; track item.route) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [title]="collapsed ? item.label : ''"
            (click)="closeMenu()">
            <span class="nav-icon">{{ item.icon }}</span>
            @if (!collapsed) {
              <span class="nav-label">{{ item.label }}</span>
            }
          </a>
        }
      </div>
    }
  </nav>
</aside>
